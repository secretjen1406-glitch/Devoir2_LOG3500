<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de Bord Météo Dynamique</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<h1>🌤️ Weather Dashboard</h1>
</header>

<main>
<!-- Section 1 : Formulaire d'action -->
<section class="search-section">
    <h2 class="visually-hidden">Recherche de meteo de ville</h2>
<form id="weather-form" novalidate>
<div class="input-group">
<label id="city-label" for="city-input">Rechercher une ville :</label>
<input
type="text"
id="city-input"
placeholder="Ex: Jacmel"
aria-invalid="false"
aria-describedby="city-error"
aria-labelledby="city-label"
>
<!-- Zone d'erreur accessible -->
<span id="city-error" class="error-message" aria-live="polite"></span>
</div>
<button type="submit">Afficher la météo</button>
</form>
</section>

<hr>

<!-- Section 2 : Zone de rendu des données -->
<section class="results-section">
<!-- Indicateur de Chargement -->
<div id="loader" class="loader hidden" aria-live="assertive">
<div class="spinner"></div>
<p>Chargement...</p>
</div>

<!-- Message d'erreur global API -->
<div id="api-error" class="api-error hidden" aria-live="assertive"></div>

<!-- Carte d'affichage des résultats -->
<div id="weather-card" class="weather-card hidden">
<h2 id="weather-location">Jacmel, Haiti</h2>
<div class="weather-info">
<div class="weather-main">
<span id="weather-status-text" class="status-badge">Ensoleillé</span>
<span id="weather-temp" class="temp-display">21.5°C</span>
</div>
<div class="weather-details">
<p>💨 Vent : <strong id="weather-wind">12.3 km/h</strong></p>
</div>
</div>
</div>
</section>
</main>

<footer>
<p>&copy; 2026 - LOG3500 - Option 2</p>
</footer>

<script src="js/app.js.js"></script>
</body>
</html>
